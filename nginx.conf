# =============================================================================
# Nginx reverse proxy for Open WebUI
# - TLS 1.2/1.3 termination with internal-CA-signed certificates
# - WebSocket upgrade for streaming token responses
# - Rate limiting against accidental DoS / runaway agents
# - Streaming-friendly buffering for low TTFB
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # -----------------------------------------------------------------
    # Core
    # -----------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;        # do not advertise nginx version

    client_max_body_size 100M;
    client_body_timeout 60s;
    keepalive_timeout 75s;

    # -----------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------
    # Rate limiting — defends against runaway clients and accidental loops
    # -----------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/s;
    limit_conn_zone $binary_remote_addr  zone=conn:10m;

    # -----------------------------------------------------------------
    # Streaming-aware proxy timeouts — LLM responses can take minutes
    # -----------------------------------------------------------------
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # -----------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -----------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------------------------------
    # HTTPS server
    # -----------------------------------------------------------------
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        # TLS — internal CA, 10-year validity for air-gapped reality
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # Apply rate / connection limits per client
        limit_req  zone=api burst=60 nodelay;
        limit_conn conn 20;

        # ---------------------------------------------------------
        # Proxy to Open WebUI
        # ---------------------------------------------------------
        location / {
            proxy_pass http://openwebui:8080;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket upgrade — required for token streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Critical for LLM streaming UX:
            # disable proxy buffering so tokens flow to the browser as they're generated
            proxy_buffering off;
            proxy_cache     off;
            proxy_request_buffering off;
        }

        # ---------------------------------------------------------
        # Health endpoint (internal monitoring only)
        # ---------------------------------------------------------
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}